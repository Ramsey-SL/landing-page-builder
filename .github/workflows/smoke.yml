name: Smoke

# Workflow C — fast, no browser. Runs on every push/PR to catch broken code.
on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Syntax check all scripts
        run: |
          for f in tools/*.js tools/*.mjs; do
            echo "node --check $f"
            node --check "$f"
          done
      - name: Smoke test (render helpers + config + template)
        run: node tools/smoke-test.mjs
